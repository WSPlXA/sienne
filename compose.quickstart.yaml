name: oauth2-sienne-idp

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${IDP_MYSQL_ROOT_PASSWORD:-ChangeThisRootPassword_32CharsMin}
      MYSQL_DATABASE: ${IDP_MYSQL_DATABASE:-app}
      MYSQL_USER: ${IDP_MYSQL_USER:-app}
      MYSQL_PASSWORD: ${IDP_MYSQL_PASSWORD:-ChangeThisAppPassword_32CharsMin}
    volumes:
      - idp-mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - idp-redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 5s

  server:
    image: ${IDP_SERVER_IMAGE:-ghcr.io/wsplxa/oauth2-sienne-idp-server:latest}
    restart: unless-stopped
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${IDP_MYSQL_DATABASE:-app}
      MYSQL_USER: ${IDP_MYSQL_USER:-app}
      MYSQL_PASSWORD: ${IDP_MYSQL_PASSWORD:-ChangeThisAppPassword_32CharsMin}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      APP_ENV: ${IDP_APP_ENV:-prod}
      FORCE_MFA_ENROLLMENT: ${IDP_FORCE_MFA_ENROLLMENT:-true}
      SESSION_TTL: ${IDP_SESSION_TTL:-8h}
      ISSUER: ${IDP_ISSUER:-http://www.idpsienne.uk}
      LISTEN_ADDR: :8080
      TOTP_SECRET_ENCRYPTION_KEY: ${IDP_TOTP_SECRET_ENCRYPTION_KEY:-AReplaceWithYour32+CharSecretKey}
      SIGNING_KEY_DIR: ${IDP_SIGNING_KEY_DIR:-/var/lib/idp/keys}
      SIGNING_KEY_CHECK_INTERVAL: ${IDP_SIGNING_KEY_CHECK_INTERVAL:-1h}
      SIGNING_KEY_ROTATE_BEFORE: ${IDP_SIGNING_KEY_ROTATE_BEFORE:-24h}
      SIGNING_KEY_RETIRE_AFTER: ${IDP_SIGNING_KEY_RETIRE_AFTER:-24h}
    volumes:
      - idp-signing-keys:/var/lib/idp/keys
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "sh", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3" ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${IDP_HTTP_PORT:-80}:80"
    volumes:
      - ./idp-server/deploy/nginx/idp.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  idp-mysql-data:
  idp-redis-data:
  idp-signing-keys:
