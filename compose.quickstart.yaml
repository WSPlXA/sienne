name: oauth2-sienne-idp

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - "mysqld"
      - "--server-id=1"
      - "--log-bin=mysql-bin"
      - "--binlog-format=ROW"
      - "--gtid-mode=ON"
      - "--enforce-gtid-consistency=ON"
    environment:
      MYSQL_ROOT_PASSWORD: ${IDP_MYSQL_ROOT_PASSWORD:-ChangeThisRootPassword_32CharsMin}
      MYSQL_DATABASE: ${IDP_MYSQL_DATABASE:-app}
      MYSQL_USER: ${IDP_MYSQL_USER:-app}
      MYSQL_PASSWORD: ${IDP_MYSQL_PASSWORD:-ChangeThisAppPassword_32CharsMin}
    volumes:
      - idp-mysql-data:/var/lib/mysql
      - ./idp-server/scripts/migrate.sql:/docker-entrypoint-initdb.d/001-migrate.sql:ro
    ports:
      - "${IDP_MYSQL_PUBLISH:-127.0.0.1:13306}:3306"
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  db-replica:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - "mysqld"
      - "--server-id=2"
      - "--log-bin=mysql-bin"
      - "--relay-log=mysql-relay-bin"
      - "--binlog-format=ROW"
      - "--gtid-mode=ON"
      - "--enforce-gtid-consistency=ON"
      - "--read-only=ON"
      - "--super-read-only=ON"
    environment:
      MYSQL_ROOT_PASSWORD: ${IDP_MYSQL_ROOT_PASSWORD:-ChangeThisRootPassword_32CharsMin}
    volumes:
      - idp-mysql-replica-data:/var/lib/mysql
    ports:
      - "${IDP_MYSQL_REPLICA_PUBLISH:-127.0.0.1:23306}:3306"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  db-replica-init:
    image: mysql:8.4
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: ${IDP_MYSQL_ROOT_PASSWORD:-ChangeThisRootPassword_32CharsMin}
      MYSQL_DATABASE: ${IDP_MYSQL_DATABASE:-app}
      MYSQL_REPL_USER: ${IDP_MYSQL_REPL_USER:-repl}
      MYSQL_REPL_PASSWORD: ${IDP_MYSQL_REPL_PASSWORD:-ChangeThisReplPassword_32CharsMin}
      MYSQL_READ_USER: ${IDP_MYSQL_READ_USER:-idp_ro}
      MYSQL_READ_PASSWORD: ${IDP_MYSQL_READ_PASSWORD:-ChangeThisReplicaReadPassword_32CharsMin}
    depends_on:
      db:
        condition: service_healthy
      db-replica:
        condition: service_healthy
    command:
      - "sh"
      - "-ec"
      - |
        mysql -h db -uroot -p"$${MYSQL_ROOT_PASSWORD}" <<EOSQL
        CREATE USER IF NOT EXISTS '$${MYSQL_REPL_USER}'@'%' IDENTIFIED BY '$${MYSQL_REPL_PASSWORD}';
        GRANT REPLICATION SLAVE, REPLICATION CLIENT ON *.* TO '$${MYSQL_REPL_USER}'@'%';
        CREATE USER IF NOT EXISTS '$${MYSQL_READ_USER}'@'%' IDENTIFIED BY '$${MYSQL_READ_PASSWORD}';
        GRANT SELECT ON \`$${MYSQL_DATABASE}\`.* TO '$${MYSQL_READ_USER}'@'%';
        FLUSH PRIVILEGES;
        EOSQL

        mysql -h db-replica -uroot -p"$${MYSQL_ROOT_PASSWORD}" <<EOSQL
        STOP REPLICA;
        RESET REPLICA ALL;
        CHANGE REPLICATION SOURCE TO
          SOURCE_HOST='db',
          SOURCE_PORT=3306,
          SOURCE_USER='$${MYSQL_REPL_USER}',
          SOURCE_PASSWORD='$${MYSQL_REPL_PASSWORD}',
          SOURCE_AUTO_POSITION=1,
          GET_SOURCE_PUBLIC_KEY=1;
        START REPLICA;
        EOSQL

        i=0
        while [ "$$i" -lt 60 ]; do
          status="$$(mysql -h db-replica -uroot -p"$${MYSQL_ROOT_PASSWORD}" -Nse "SHOW REPLICA STATUS\\G")"
          echo "$$status" | grep -q "Replica_IO_Running: Yes" && \
          echo "$$status" | grep -q "Replica_SQL_Running: Yes" && \
          exit 0
          i=$$((i + 1))
          sleep 2
        done
        echo "replica init failed: replication is not running"
        exit 1

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - idp-redis-data:/data
    ports:
      - "${IDP_REDIS_PUBLISH:-127.0.0.1:16379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 5s

  server:
    image: ${IDP_SERVER_IMAGE:-ghcr.io/wsplxa/sienne-idp-server:latest}
    restart: unless-stopped
    environment:
      # Optional explicit primary DSN (if set, overrides MYSQL_HOST/MYSQL_PORT/...).
      MYSQL_DSN: ${IDP_MYSQL_DSN:-}
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${IDP_MYSQL_DATABASE:-app}
      MYSQL_USER: ${IDP_MYSQL_USER:-app}
      MYSQL_PASSWORD: ${IDP_MYSQL_PASSWORD:-ChangeThisAppPassword_32CharsMin}
      # Replica DSN should use read-only account (e.g. idp_ro). Leave empty to fallback to primary.
      MYSQL_READ_DSN: ${IDP_MYSQL_READ_DSN:-idp_ro:ChangeThisReplicaReadPassword_32CharsMin@tcp(db-replica:3306)/app?parseTime=true&charset=utf8mb4&collation=utf8mb4_unicode_ci}
      MYSQL_STRONG_READ_SESSION_BY_ID: ${IDP_MYSQL_STRONG_READ_SESSION_BY_ID:-true}
      MYSQL_STRONG_READ_TOKEN_BY_SHA256: ${IDP_MYSQL_STRONG_READ_TOKEN_BY_SHA256:-true}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      APP_ENV: ${IDP_APP_ENV:-prod}
      FORCE_MFA_ENROLLMENT: ${IDP_FORCE_MFA_ENROLLMENT:-true}
      SESSION_TTL: ${IDP_SESSION_TTL:-8h}
      ISSUER: ${IDP_ISSUER:-https://idpsienne.uk}
      TOTP_ISSUER: ${IDP_TOTP_ISSUER:-IDP Sienne}
      PASSKEY_ENABLED: ${IDP_PASSKEY_ENABLED:-true}
      PASSKEY_RP_ID: ${IDP_PASSKEY_RP_ID:-idpsienne.uk}
      PASSKEY_RP_ORIGINS: ${IDP_PASSKEY_RP_ORIGINS:-https://idpsienne.uk}
      LISTEN_ADDR: :8080
      TOTP_SECRET_ENCRYPTION_KEY: ${IDP_TOTP_SECRET_ENCRYPTION_KEY:-AReplaceWithYour32+CharSecretKey}
      SIGNING_KEY_DIR: ${IDP_SIGNING_KEY_DIR:-/var/lib/idp/keys}
      SIGNING_KEY_CHECK_INTERVAL: ${IDP_SIGNING_KEY_CHECK_INTERVAL:-1h}
      SIGNING_KEY_ROTATE_BEFORE: ${IDP_SIGNING_KEY_ROTATE_BEFORE:-24h}
      SIGNING_KEY_RETIRE_AFTER: ${IDP_SIGNING_KEY_RETIRE_AFTER:-24h}
    volumes:
      - idp-signing-keys:/var/lib/idp/keys
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
      db-replica-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "sh", "-c", "kill -0 1" ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${IDP_HTTP_PORT:-80}:80"
    volumes:
      - ./idp-server/deploy/nginx/idp.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  idp-mysql-data:
  idp-mysql-replica-data:
  idp-redis-data:
  idp-signing-keys:
