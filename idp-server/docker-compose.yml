services:
  db:
    build:
      context: .
      dockerfile: dockerfile.db
    image: idp-db
    container_name: idp-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - idp-network

  redis:
    build:
      context: .
      dockerfile: dockerfile.reids
    image: idp-redis
    container_name: idp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks:
      - idp-network

  server:
    build:
      context: .
      dockerfile: dockerfile.server
    image: idp-server
    container_name: idp-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: apppass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      APP_ENV: dev
      SESSION_TTL: 8h
      ISSUER: http://localhost:8080
      LISTEN_ADDR: :8080
      SIGNING_KEY_DIR: scripts/dev_keys
      SIGNING_KEY_CHECK_INTERVAL: 1h
      SIGNING_KEY_ROTATE_BEFORE: 24h
      SIGNING_KEY_RETIRE_AFTER: 24h
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "sh", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q '200 OK' <&3"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - idp-network

networks:
  idp-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
