services:
  db:
    build:
      context: .
      dockerfile: dockerfile.db
    image: idp-db
    container_name: idp-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${IDP_MYSQL_ROOT_PASSWORD:-ChangeThisRootPassword_32CharsMin}
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: ${IDP_MYSQL_PASSWORD:-ChangeThisAppPassword_32CharsMin}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - idp-network

  redis:
    build:
      context: .
      dockerfile: dockerfile.reids
    image: idp-redis
    container_name: idp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks:
      - idp-network

  server:
    build:
      context: .
      dockerfile: dockerfile.server
    image: idp-server
    restart: unless-stopped
    volumes:
      - ./config/idp.docker.yaml:/app/config/idp.yaml
      - ./scripts/dev_keys:/app/scripts/dev_keys
    environment:
      MYSQL_PASSWORD: ${IDP_MYSQL_PASSWORD:-ChangeThisAppPassword_32CharsMin}
      TOTP_SECRET_ENCRYPTION_KEY: ${IDP_TOTP_SECRET_ENCRYPTION_KEY:-ChangeThisTOTPSecretKey32Chars!!}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q '200 OK' <&3"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - idp-network

networks:
  idp-network:
    name: idp-network
    driver: bridge

volumes:
  mysql-data:
  redis-data:
