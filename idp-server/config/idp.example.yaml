app:
  env: dev

mysql:
  dsn: "idp:ChangeThisAppPassword_32CharsMin@tcp(localhost:3306)/idp?parseTime=true&charset=utf8mb4&collation=utf8mb4_unicode_ci"
  read_dsn: "idp:ChangeThisReadPassword_32CharsMin@tcp(localhost:3307)/idp?parseTime=true&charset=utf8mb4&collation=utf8mb4_unicode_ci"
  strong_read:
    session_by_id: true
    token_by_sha256: true

redis:
  addr: "localhost:6379"
  password: ""
  db: 0
  key_prefix: "idp"

issuer: "http://localhost:8080"

session:
  ttl: "8h"

audit:
  async_enabled: true
  consumer_group: "audit-writers"
  consumer_name: "idp-server"
  batch_size: 16
  dedup_ttl: "24h"
  retry_ttl: "24h"
  block_timeout: "2s"
  reclaim_idle: "30s"
  reclaim_interval: "15s"
  max_retry_count: 10

totp:
  issuer: "IDP Server"
  secret_encryption_key: "ChangeThisTOTPSecretKey32Chars!!"

jwt:
  key_id: "kid-2026-01-rs256"

signing_key:
  dir: "scripts/dev_keys"
  bits: 2048
  check_interval: "1h"
  rotate_before: "24h"
  retire_after: "24h"

login:
  failure_window: "15m"
  max_failures_per_ip: 20
  max_failures_per_user: 5
  user_lock_threshold: 5
  user_lock_ttl: "30m"

mfa:
  force_enrollment: true

passkey:
  enabled: true
  rp_display_name: "IDP Server"
  rp_origins:
    - "http://localhost:8080"

federated_oidc:
  provider_name: "OpenID Connect"
  client_auth_method: "client_secret_basic"
  username_claim: "preferred_username"
  display_name_claim: "name"
  email_claim: "email"
  scopes:
    - "openid"
    - "profile"
    - "email"
  state_ttl: "10m"
  # Google OIDC quick start. Keep real values in private env/config only:
  # issuer: "https://accounts.google.com"
  # client_id: "replace-with-private-client-id"
  # client_secret: "replace-with-private-client-secret"
  # redirect_uri: "http://localhost:8080/login"
  # provider_name: "Google"
  # client_auth_method: "client_secret_post"
  # username_claim: "email"
