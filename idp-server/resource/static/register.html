<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account | Sienne IDP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ["'Playfair Display'", "serif"],
            sans: ["'Inter'", "sans-serif"],
            mono: ["'JetBrains Mono'", "monospace"],
          },
          colors: {
            brand: {
              black: "#0F0F11",
              white: "#FFFFFF",
              accent: "#2563EB",
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,600;0,800;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 1000px white inset !important;
      -webkit-text-fill-color: #0F0F11 !important;
    }
  </style>
</head>
<body class="min-h-screen bg-brand-white text-brand-black font-sans selection:bg-brand-accent selection:text-white flex flex-col antialiased">
  <header class="w-full border-b-2 border-brand-black px-6 py-4 flex justify-between items-center bg-white">
    <div class="flex items-center gap-3">
      <div class="h-6 w-6 bg-brand-black text-white flex items-center justify-center text-xs">
        <i class="fa-solid fa-user-plus"></i>
      </div>
      <span class="font-mono text-xs font-bold uppercase tracking-widest">Sienne IDP</span>
    </div>
    <div class="font-mono text-xs text-gray-500 uppercase tracking-widest hidden sm:block">SYS.REG.01</div>
  </header>

  <main class="flex-1 flex flex-col md:flex-row">
    <!-- Left: Editorial Content -->
    <div class="border-b-2 md:border-b-0 md:border-r-2 border-brand-black p-8 md:p-16 lg:p-24 flex flex-col justify-center bg-gray-50 relative overflow-hidden flex-1">
      <div class="absolute -left-10 -top-10 text-[10rem] text-gray-200/50 font-serif font-black leading-none select-none pointer-events-none">REG</div>
      <div class="relative z-10">
        <p class="font-mono text-xs uppercase tracking-widest text-brand-accent mb-6 font-bold">Identity Onboarding</p>
        <h1 class="font-serif text-5xl md:text-6xl lg:text-7xl font-extrabold leading-none tracking-tight mb-8 text-brand-black">Create Account</h1>
        <p class="text-lg text-gray-600 max-w-md font-sans">Establish your credentials to access system resources. Ensure your information is accurate.</p>
      </div>
    </div>

    <!-- Right: Utilitarian Form -->
    <div class="p-8 md:p-16 lg:p-24 flex flex-col justify-center relative bg-white flex-1 md:max-w-2xl">
      <div class="absolute inset-0 bg-[linear-gradient(to_right,#e5e7eb_1px,transparent_1px),linear-gradient(to_bottom,#e5e7eb_1px,transparent_1px)] bg-[size:4rem_4rem] opacity-30 pointer-events-none"></div>
      
      <div class="w-full mx-auto relative z-10">
        {{if .Error}}
        <div class="mb-8 border-2 border-brand-black bg-red-100 p-4 font-mono text-sm text-brand-black font-bold shadow-[4px_4px_0_0_#0F0F11]">
          <i class="fa-solid fa-triangle-exclamation mr-2 text-red-600"></i>[ERR] {{.Error}}
        </div>
        {{end}}

        {{if .Success}}
        <div class="mb-8 border-2 border-brand-black bg-brand-accent p-4 font-mono text-sm text-white font-bold shadow-[4px_4px_0_0_#0F0F11]">
          <i class="fa-solid fa-check mr-2"></i>[OK] Registration completed. <a href="/login" class="underline ml-2">Proceed to Sign In</a>
        </div>
        {{end}}

        <form method="post" class="space-y-6">
          <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

          <div class="space-y-2">
            <label class="flex justify-between items-baseline">
              <span class="font-mono text-xs font-bold uppercase tracking-widest text-brand-black">Username</span>
            </label>
            <input name="username" value="{{.Username}}" autocomplete="username" required 
              class="w-full border-2 border-brand-black bg-white px-4 py-3 font-mono text-sm outline-none transition focus:shadow-[4px_4px_0_0_#2563EB] placeholder-gray-400">
          </div>

          <div class="space-y-2">
            <label class="flex justify-between items-baseline">
              <span class="font-mono text-xs font-bold uppercase tracking-widest text-brand-black">Email</span>
            </label>
            <input name="email" type="email" value="{{.Email}}" autocomplete="email" required 
              class="w-full border-2 border-brand-black bg-white px-4 py-3 font-mono text-sm outline-none transition focus:shadow-[4px_4px_0_0_#2563EB] placeholder-gray-400">
          </div>

          <div class="space-y-2">
            <label class="flex justify-between items-baseline">
              <span class="font-mono text-xs font-bold uppercase tracking-widest text-brand-black">Display Name</span>
            </label>
            <input name="display_name" value="{{.DisplayName}}" required 
              class="w-full border-2 border-brand-black bg-white px-4 py-3 font-mono text-sm outline-none transition focus:shadow-[4px_4px_0_0_#2563EB] placeholder-gray-400">
          </div>

          <div class="space-y-2">
            <label class="flex justify-between items-baseline">
              <span class="font-mono text-xs font-bold uppercase tracking-widest text-brand-black">Password</span>
            </label>
            <input name="password" type="password" autocomplete="new-password" required 
              class="w-full border-2 border-brand-black bg-white px-4 py-3 font-mono text-sm outline-none transition focus:shadow-[4px_4px_0_0_#2563EB] placeholder-gray-400">
          </div>

          <button type="submit" class="w-full border-2 border-brand-black bg-brand-black px-4 py-4 font-mono text-sm font-bold text-white transition-all hover:bg-white hover:text-brand-black hover:shadow-[4px_4px_0_0_#0F0F11] mt-4">
            <span class="flex items-center justify-center gap-3">
              INITIALIZE REGISTRATION
              <i class="fa-solid fa-arrow-right"></i>
            </span>
          </button>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
