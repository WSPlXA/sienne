<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン認証コード</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Manrope", "Noto Sans JP", "sans-serif"]
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_20%_10%,#d1fae5_0%,transparent_30%),radial-gradient(circle_at_90%_90%,#a7f3d0_0%,transparent_25%),linear-gradient(135deg,#f0fdfa_0%,#f8fafc_55%,#ecfeff_100%)] text-slate-900">
  <div class="mx-auto flex min-h-screen w-full max-w-4xl items-center justify-center px-4 py-10">
    <main class="w-full max-w-md rounded-3xl border border-slate-200 bg-white/85 p-7 shadow-[0_24px_90px_rgba(15,23,42,0.15)] backdrop-blur sm:p-9">
      <div class="inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-emerald-50 text-emerald-700">
        <i class="fa-solid fa-mobile-screen-button"></i>
      </div>
      <p class="mt-4 text-xs font-bold uppercase tracking-[0.2em] text-slate-500">MFA Check</p>
      <h1 class="mt-2 text-3xl font-extrabold tracking-tight">6桁コードを入力</h1>
      <p class="mt-2 text-sm text-slate-500">認証アプリに表示されたコードを入力してください。</p>

      {{if .Error}}
      <div class="mt-5 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        <i class="fa-solid fa-circle-exclamation mr-2"></i>{{.Error}}
      </div>
      {{end}}

      <form method="post" class="mt-6 space-y-5">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <label class="block">
          <span class="mb-2 block text-xs font-bold uppercase tracking-[0.18em] text-slate-500">Authenticator Code</span>
          <input id="code" name="code" maxlength="6" autocomplete="one-time-code" inputmode="numeric" placeholder="123456" class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-center text-2xl font-bold tracking-[0.35em] outline-none transition focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100">
        </label>

        <button type="submit" class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-emerald-600 to-teal-700 px-4 py-3 text-sm font-bold text-white shadow-[0_14px_30px_rgba(5,150,105,0.25)] transition hover:brightness-105">
          <i class="fa-solid fa-check"></i>
          検証して続行
        </button>
      </form>
    </main>
  </div>
</body>
</html>
