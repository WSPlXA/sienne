<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Passkey Setup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Manrope", "sans-serif"]
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_15%_15%,#e0f2fe_0%,transparent_30%),radial-gradient(circle_at_80%_5%,#fef3c7_0%,transparent_30%),linear-gradient(135deg,#f0f9ff_0%,#f8fafc_45%,#ecfeff_100%)] text-slate-900">
  <div class="mx-auto flex min-h-screen w-full max-w-4xl items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
    <main class="w-full overflow-hidden rounded-3xl border border-slate-200 bg-white/85 p-6 shadow-[0_30px_100px_rgba(15,23,42,0.12)] backdrop-blur sm:p-8 lg:p-10">
      <div class="inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-cyan-50 text-cyan-700">
        <i class="fa-solid fa-key"></i>
      </div>
      <p class="mt-4 text-xs font-bold uppercase tracking-[0.2em] text-slate-500">MFA Enrollment</p>
      <h1 class="mt-2 text-3xl font-extrabold tracking-tight">Set Up Passkey</h1>
      <p class="mt-2 text-sm text-slate-600">Click the button below. Your browser can show a QR code and your phone can complete passkey registration.</p>

      {{if .Error}}
      <div class="mt-5 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        <i class="fa-solid fa-circle-exclamation mr-2"></i>{{.Error}}
      </div>
      {{end}}

      <div class="mt-6 rounded-2xl border border-slate-200 bg-white p-5">
        <input type="hidden" id="csrf-token" value="{{.CSRFToken}}">
        <input type="hidden" id="return-to" value="{{.ReturnTo}}">
        <button id="passkey-setup-button" type="button" class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-cyan-600 to-sky-700 px-5 py-3 text-sm font-bold text-white shadow-[0_14px_30px_rgba(8,145,178,0.25)] transition hover:brightness-105">
          <i class="fa-solid fa-mobile-screen-button"></i>
          Register Passkey
        </button>
        <p id="passkey-setup-status" class="mt-3 text-sm text-slate-600"></p>
      </div>
    </main>
  </div>

  <script>
    (function () {
      const button = document.getElementById("passkey-setup-button");
      const statusEl = document.getElementById("passkey-setup-status");
      const csrfToken = (document.getElementById("csrf-token") || {}).value || "";
      const returnTo = (document.getElementById("return-to") || {}).value || "";

      function fromBase64URL(input) {
        const normalized = (input || "").replace(/-/g, "+").replace(/_/g, "/");
        const padded = normalized + "===".slice((normalized.length + 3) % 4);
        const binary = atob(padded);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) {
          bytes[i] = binary.charCodeAt(i);
        }
        return bytes.buffer;
      }

      function toBase64URL(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = "";
        for (let i = 0; i < bytes.byteLength; i += 1) {
          binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
      }

      function parseCreationOptions(options) {
        const source = options && options.publicKey ? options.publicKey : options;
        const out = Object.assign({}, source || {});
        out.challenge = fromBase64URL(out.challenge);
        if (out.user && out.user.id) {
          out.user = Object.assign({}, out.user, { id: fromBase64URL(out.user.id) });
        }
        if (Array.isArray(out.excludeCredentials)) {
          out.excludeCredentials = out.excludeCredentials.map(function (cred) {
            return Object.assign({}, cred, { id: fromBase64URL(cred.id) });
          });
        }
        return out;
      }

      function serializeAttestation(credential) {
        const response = credential.response || {};
        return {
          id: credential.id,
          type: credential.type,
          rawId: toBase64URL(credential.rawId),
          authenticatorAttachment: credential.authenticatorAttachment || "",
          clientExtensionResults: credential.getClientExtensionResults ? credential.getClientExtensionResults() : {},
          response: {
            clientDataJSON: toBase64URL(response.clientDataJSON),
            attestationObject: toBase64URL(response.attestationObject)
          }
        };
      }

      async function postForm(payload) {
        const body = new URLSearchParams(payload);
        const res = await fetch("/mfa/passkey/setup", {
          method: "POST",
          headers: { "Accept": "application/json", "Content-Type": "application/x-www-form-urlencoded" },
          credentials: "same-origin",
          body: body.toString()
        });
        const data = await res.json().catch(function () { return {}; });
        if (!res.ok) {
          throw new Error(data.error || "request_failed");
        }
        return data;
      }

      if (!button || !statusEl) {
        return;
      }

      button.addEventListener("click", async function () {
        if (!window.PublicKeyCredential || !navigator.credentials || !navigator.credentials.create) {
          statusEl.textContent = "Passkey is not available in this browser.";
          return;
        }
        button.disabled = true;
        statusEl.textContent = "Preparing passkey registration...";
        try {
          const begin = await postForm({
            action: "begin",
            csrf_token: csrfToken,
            return_to: returnTo
          });
          const options = parseCreationOptions(begin.options || {});
          statusEl.textContent = "Waiting for passkey registration...";
          const credential = await navigator.credentials.create({ publicKey: options });
          const finish = await postForm({
            action: "finish",
            setup_id: begin.setup_id,
            response_json: JSON.stringify(serializeAttestation(credential)),
            csrf_token: csrfToken,
            return_to: returnTo
          });
          statusEl.textContent = "Passkey setup completed. Redirecting...";
          if (finish.redirect_uri) {
            window.location.replace(finish.redirect_uri);
            return;
          }
          window.location.replace("/");
        } catch (err) {
          statusEl.textContent = err && err.message ? err.message : "Passkey setup failed.";
          button.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
