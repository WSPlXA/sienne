<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Passkey Setup | Sienne IDP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ["'Playfair Display'", "serif"],
            sans: ["'Inter'", "sans-serif"],
            mono: ["'JetBrains Mono'", "monospace"],
          },
          colors: {
            brand: {
              black: "#0F0F11",
              white: "#FFFFFF",
              accent: "#2563EB",
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,600;0,800;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="min-h-screen bg-brand-white text-brand-black font-sans selection:bg-brand-accent selection:text-white flex flex-col antialiased">
  <div class="absolute inset-0 bg-[linear-gradient(to_right,#e5e7eb_1px,transparent_1px),linear-gradient(to_bottom,#e5e7eb_1px,transparent_1px)] bg-[size:4rem_4rem] opacity-30 pointer-events-none fixed"></div>

  <header class="w-full border-b-2 border-brand-black px-6 py-4 flex justify-between items-center bg-white relative z-20">
    <div class="flex items-center gap-3">
      <div class="h-6 w-6 bg-brand-black text-white flex items-center justify-center text-xs">
        <i class="fa-solid fa-key"></i>
      </div>
      <span class="font-mono text-xs font-bold uppercase tracking-widest">Sienne IDP</span>
    </div>
    <div class="font-mono text-xs text-gray-500 uppercase tracking-widest hidden sm:block">SYS.PASSKEY.01</div>
  </header>

  <main class="flex-1 flex items-center justify-center p-6 relative z-10">
    <div class="w-full max-w-2xl bg-white border-2 border-brand-black shadow-[8px_8px_0_0_#0F0F11]">
      <div class="p-8 md:p-12 border-b-2 border-brand-black bg-gray-50 relative overflow-hidden">
        <div class="absolute right-0 top-0 opacity-10 text-[8rem] font-serif font-black leading-none pointer-events-none text-brand-black">KEY</div>
        <p class="font-mono text-xs font-bold uppercase tracking-widest text-brand-accent mb-4">MFA Enrollment</p>
        <h1 class="font-serif text-4xl md:text-5xl font-extrabold tracking-tight mb-4">Set Up Passkey</h1>
        <p class="text-sm text-gray-600 font-sans max-w-md">Click the button below. Your browser can show a QR code and your phone can complete passkey registration.</p>
      </div>

      <div class="p-8 md:p-12 bg-white">
        {{if .Error}}
        <div class="mb-8 border-2 border-brand-black bg-red-100 p-4 font-mono text-sm text-brand-black font-bold shadow-[4px_4px_0_0_#0F0F11]">
          <i class="fa-solid fa-triangle-exclamation mr-2 text-red-600"></i>[ERR] {{.Error}}
        </div>
        {{end}}

        <div class="border-2 border-brand-black bg-white p-6 shadow-[4px_4px_0_0_#0F0F11]">
          <input type="hidden" id="csrf-token" value="{{.CSRFToken}}">
          <input type="hidden" id="return-to" value="{{.ReturnTo}}">
          <button id="passkey-setup-button" type="button" class="w-full border-2 border-brand-black bg-brand-black px-4 py-4 font-mono text-sm font-bold text-white transition-all hover:bg-white hover:text-brand-black hover:shadow-[4px_4px_0_0_#0F0F11]">
            <span class="flex items-center justify-center gap-3">
              <i class="fa-solid fa-mobile-screen-button"></i> INITIALIZE REGISTRATION
            </span>
          </button>
          <p id="passkey-setup-status" class="mt-4 font-mono text-xs font-bold text-brand-black text-center h-4"></p>
        </div>
      </div>
    </div>
  </main>

  <script>
    (function () {
      const button = document.getElementById("passkey-setup-button");
      const statusEl = document.getElementById("passkey-setup-status");
      const csrfToken = (document.getElementById("csrf-token") || {}).value || "";
      const returnTo = (document.getElementById("return-to") || {}).value || "";

      function fromBase64URL(input) {
        const normalized = (input || "").replace(/-/g, "+").replace(/_/g, "/");
        const padded = normalized + "===".slice((normalized.length + 3) % 4);
        const binary = atob(padded);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) {
          bytes[i] = binary.charCodeAt(i);
        }
        return bytes.buffer;
      }

      function toBase64URL(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = "";
        for (let i = 0; i < bytes.byteLength; i += 1) {
          binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
      }

      function parseCreationOptions(options) {
        const source = options && options.publicKey ? options.publicKey : options;
        const out = Object.assign({}, source || {});
        out.challenge = fromBase64URL(out.challenge);
        if (out.user && out.user.id) {
          out.user = Object.assign({}, out.user, { id: fromBase64URL(out.user.id) });
        }
        if (Array.isArray(out.excludeCredentials)) {
          out.excludeCredentials = out.excludeCredentials.map(function (cred) {
            return Object.assign({}, cred, { id: fromBase64URL(cred.id) });
          });
        }
        return out;
      }

      function serializeAttestation(credential) {
        const response = credential.response || {};
        return {
          id: credential.id,
          type: credential.type,
          rawId: toBase64URL(credential.rawId),
          authenticatorAttachment: credential.authenticatorAttachment || "",
          clientExtensionResults: credential.getClientExtensionResults ? credential.getClientExtensionResults() : {},
          response: {
            clientDataJSON: toBase64URL(response.clientDataJSON),
            attestationObject: toBase64URL(response.attestationObject)
          }
        };
      }

      async function postForm(payload) {
        const body = new URLSearchParams(payload);
        const res = await fetch("/mfa/passkey/setup", {
          method: "POST",
          headers: { "Accept": "application/json", "Content-Type": "application/x-www-form-urlencoded" },
          credentials: "same-origin",
          body: body.toString()
        });
        const data = await res.json().catch(function () { return {}; });
        if (!res.ok) {
          throw new Error(data.error || "request_failed");
        }
        return data;
      }

      if (!button || !statusEl) {
        return;
      }

      button.addEventListener("click", async function () {
        if (!window.PublicKeyCredential || !navigator.credentials || !navigator.credentials.create) {
          statusEl.textContent = "Passkey is not available in this browser.";
          return;
        }
        button.disabled = true;
        statusEl.textContent = "PREPARING...";
        try {
          const begin = await postForm({
            action: "begin",
            csrf_token: csrfToken,
            return_to: returnTo
          });
          const options = parseCreationOptions(begin.options || {});
          statusEl.textContent = "AWAITING AUTHENTICATOR...";
          const credential = await navigator.credentials.create({ publicKey: options });
          const finish = await postForm({
            action: "finish",
            setup_id: begin.setup_id,
            response_json: JSON.stringify(serializeAttestation(credential)),
            csrf_token: csrfToken,
            return_to: returnTo
          });
          statusEl.textContent = "SUCCESS. REDIRECTING...";
          if (finish.redirect_uri) {
            window.location.replace(finish.redirect_uri);
            return;
          }
          window.location.replace("/");
        } catch (err) {
          statusEl.textContent = err && err.message ? "[ERR] " + err.message : "[ERR] Setup failed.";
          button.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
