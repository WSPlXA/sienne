<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログアウト</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Manrope", "Noto Sans JP", "sans-serif"]
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_12%_12%,#fee2e2_0%,transparent_30%),radial-gradient(circle_at_85%_90%,#ffedd5_0%,transparent_32%),linear-gradient(135deg,#fff7ed_0%,#fffaf5_45%,#fef2f2_100%)] text-slate-900">
  <div class="mx-auto flex min-h-screen w-full max-w-3xl items-center justify-center px-4 py-10 sm:px-6">
    <main class="w-full max-w-lg rounded-3xl border border-slate-200 bg-white/90 p-6 shadow-[0_30px_100px_rgba(15,23,42,0.12)] backdrop-blur sm:p-8">
      <div class="inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-orange-50 text-orange-700">
        <i class="fa-solid fa-right-from-bracket"></i>
      </div>
      <p class="mt-4 text-xs font-bold uppercase tracking-[0.2em] text-slate-500">End Session</p>
      <h1 class="mt-2 text-3xl font-extrabold tracking-tight">ログアウト</h1>

      {{if .Error}}
      <div class="mt-5 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        <i class="fa-solid fa-circle-exclamation mr-2"></i>{{.Error}}
      </div>
      {{end}}

      <div class="mt-6 space-y-4 rounded-2xl border border-slate-200 bg-slate-50 p-5 text-sm">
        <div>
          <p class="text-xs font-bold uppercase tracking-[0.18em] text-slate-500">Client ID</p>
          <p class="mt-1 break-all font-semibold text-slate-800">{{if .ClientID}}{{.ClientID}}{{else}}-{{end}}</p>
        </div>
        <div>
          <p class="text-xs font-bold uppercase tracking-[0.18em] text-slate-500">Post Logout Redirect</p>
          <p class="mt-1 break-all font-semibold text-slate-800">{{if .PostLogoutRedirectURI}}{{.PostLogoutRedirectURI}}{{else}}/login{{end}}</p>
        </div>
      </div>

      <form id="logout-form" method="post" action="/connect/logout" class="mt-6">
        <input type="hidden" name="client_id" value="{{.ClientID}}">
        <input type="hidden" name="post_logout_redirect_uri" value="{{.PostLogoutRedirectURI}}">
        <input type="hidden" name="state" value="{{.State}}">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <button type="submit" class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-orange-600 to-red-600 px-4 py-3 text-sm font-bold text-white shadow-[0_14px_30px_rgba(234,88,12,0.28)] transition hover:brightness-105">
          <i class="fa-solid fa-power-off"></i>
          ログアウトを実行
        </button>
      </form>

      <p class="mt-3 text-center text-xs text-slate-500">自動送信されない場合はボタンを押してください。</p>
    </main>
  </div>

  <script>
    window.addEventListener("load", function () {
      setTimeout(function () {
        var form = document.getElementById("logout-form");
        if (form) {
          if (form.requestSubmit) {
            form.requestSubmit();
            return;
          }
          form.submit();
        }
      }, 600);
    });
  </script>
</body>
</html>
