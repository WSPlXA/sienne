<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Manrope", "sans-serif"]
          },
          colors: {
            brand: {
              50: "#f0fdf9",
              100: "#ccfbef",
              500: "#14b8a6",
              600: "#0d9488",
              700: "#0f766e"
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_15%_15%,#d1fae5_0%,transparent_30%),radial-gradient(circle_at_85%_10%,#fef3c7_0%,transparent_28%),linear-gradient(135deg,#eefaf6_0%,#f8f7f1_45%,#f2f2ea_100%)] text-slate-900">
  <div class="mx-auto flex min-h-screen w-full max-w-6xl items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
    <main class="w-full max-w-lg rounded-3xl border border-slate-200/70 bg-white/85 p-7 shadow-[0_28px_100px_rgba(15,23,42,0.12)] backdrop-blur sm:p-10">
      <div class="inline-flex h-12 w-12 items-center justify-center rounded-xl bg-brand-50 text-brand-700">
        <i class="fa-solid fa-shield-halved"></i>
      </div>
      <p class="mt-3 text-xs uppercase tracking-[0.22em] text-slate-500">Sienne IDP</p>

      <header class="mt-2 mb-7">
        <h1 class="text-3xl font-extrabold tracking-tight">Sign In</h1>
        <p class="mt-2 text-sm text-slate-500">Use your account credentials to continue.</p>
      </header>

      {{if .Error}}
      <div class="mb-5 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        <i class="fa-solid fa-circle-exclamation mr-2"></i>{{.Error}}
      </div>
      {{end}}

      {{if .Success}}
      <div class="mb-5 rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700">
        <i class="fa-solid fa-circle-check mr-2"></i>Authentication succeeded.
      </div>
      {{end}}

      <form method="post" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <input type="hidden" name="return_to" value="{{.ReturnTo}}">

        <label class="block">
          <span class="mb-2 block text-xs font-bold uppercase tracking-[0.18em] text-slate-500">Username</span>
          <input type="text" id="username" name="username" value="{{.Username}}" placeholder="username" autocomplete="username" required class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm shadow-sm outline-none transition focus:border-brand-500 focus:ring-4 focus:ring-brand-100">
        </label>

        <label class="block">
          <span class="mb-2 block text-xs font-bold uppercase tracking-[0.18em] text-slate-500">Password</span>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm shadow-sm outline-none transition focus:border-brand-500 focus:ring-4 focus:ring-brand-100">
        </label>

        <button type="submit" class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-brand-600 to-brand-700 px-4 py-3 text-sm font-bold text-white shadow-[0_14px_30px_rgba(13,148,136,0.25)] transition hover:brightness-105">
          <i class="fa-solid fa-arrow-right-to-bracket"></i>
          Sign In
        </button>
      </form>

      {{if .FederatedOIDCEnabled}}
      <div class="my-6 flex items-center gap-3 text-xs uppercase tracking-[0.18em] text-slate-400">
        <span class="h-px flex-1 bg-slate-200"></span>
        OIDC
        <span class="h-px flex-1 bg-slate-200"></span>
      </div>

      <form method="post">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <input type="hidden" name="return_to" value="{{.ReturnTo}}">
        <input type="hidden" name="method" value="federated_oidc">
        <button type="submit" class="inline-flex w-full items-center justify-center gap-2 rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm font-bold text-slate-700 transition hover:bg-slate-50">
          <i class="fa-brands fa-openid text-emerald-700"></i>
          Sign in with {{.FederatedOIDCProviderName}}
        </button>
      </form>
      {{end}}
    </main>
  </div>
</body>
</html>
