<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Approve Sign-in</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-[linear-gradient(140deg,#ecfeff_0%,#f8fafc_45%,#ecfccb_100%)] font-[Manrope] text-slate-900">
  <div class="mx-auto flex min-h-screen w-full max-w-3xl items-center justify-center px-4 py-10">
    <main class="w-full max-w-lg rounded-3xl border border-slate-200 bg-white/90 p-8 shadow-[0_20px_80px_rgba(15,23,42,0.15)]">
      <p class="text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Push Approval</p>
      <h1 class="mt-2 text-3xl font-extrabold tracking-tight">Approve Sign-in</h1>
      <p class="mt-2 text-sm text-slate-600">Use this page on your trusted device after you are already logged in.</p>

      {{if .Error}}
      <div class="mt-5 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">{{.Error}}</div>
      {{end}}
      {{if .Status}}
      <div class="mt-5 rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700">Status: {{.Status}}</div>
      {{end}}

      <form method="post" class="mt-6 space-y-4">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <label class="block">
          <span class="mb-1 block text-xs font-bold uppercase tracking-[0.16em] text-slate-500">Challenge ID</span>
          <input name="challenge_id" value="{{.ChallengeID}}" class="w-full rounded-xl border border-slate-300 px-4 py-3 font-mono text-sm outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100">
        </label>
        <label class="block">
          <span class="mb-1 block text-xs font-bold uppercase tracking-[0.16em] text-slate-500">Match Code</span>
          <input name="match_code" value="{{.MatchCode}}" maxlength="2" class="w-full rounded-xl border border-slate-300 px-4 py-3 text-xl font-black tracking-[0.2em] outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100">
        </label>

        <div class="grid grid-cols-2 gap-3 pt-2">
          <button type="submit" name="action" value="approve" class="rounded-xl bg-emerald-600 px-4 py-3 text-sm font-bold text-white hover:bg-emerald-700">Approve</button>
          <button type="submit" name="action" value="deny" class="rounded-xl bg-rose-600 px-4 py-3 text-sm font-bold text-white hover:bg-rose-700">Deny</button>
        </div>
      </form>
    </main>
  </div>
</body>
</html>
