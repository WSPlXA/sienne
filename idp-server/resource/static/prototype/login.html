<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prototype - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Manrope", "Noto Sans SC", "sans-serif"] } } } };
  </script>
</head>
<body class="min-h-screen bg-[linear-gradient(135deg,#ecfdf5_0%,#f8fafc_50%,#ecfeff_100%)] font-sans text-slate-900">
  <main class="mx-auto flex min-h-screen max-w-5xl items-center px-5 py-10">
    <div class="grid w-full overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-xl md:grid-cols-[1fr_420px]">
      <section class="hidden bg-slate-900 p-10 text-white md:block">
        <p class="text-xs uppercase tracking-[0.22em] text-white/70">OAuth2 / OIDC Identity Provider</p>
        <h1 class="mt-3 text-4xl font-extrabold">Secure Sign-In</h1>
        <div class="mt-8 grid gap-3 text-sm">
          <div class="rounded-xl border border-white/10 bg-white/5 p-4">支持 Password 与 OIDC 联邦登录</div>
          <div class="rounded-xl border border-white/10 bg-white/5 p-4">登录后按策略进入 MFA 绑定或 TOTP 验证</div>
          <div class="rounded-xl border border-white/10 bg-white/5 p-4">成功后跳回 /oauth2/authorize</div>
        </div>
      </section>
      <section class="p-7 sm:p-10">
        <h2 class="text-3xl font-extrabold tracking-tight">登录</h2>
        <p class="mt-2 text-sm text-slate-500">输入账号密码继续</p>
        <form class="mt-7 space-y-4">
          <label class="block">
            <span class="mb-2 block text-xs font-bold uppercase tracking-[0.16em] text-slate-500">Username</span>
            <input value="alice" class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100">
          </label>
          <label class="block">
            <span class="mb-2 block text-xs font-bold uppercase tracking-[0.16em] text-slate-500">Password</span>
            <input type="password" value="password" class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100">
          </label>
          <button type="button" class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-emerald-600 to-teal-700 px-4 py-3 text-sm font-bold text-white">
            <i class="fa-solid fa-arrow-right-to-bracket"></i>登录
          </button>
        </form>
        <div class="my-5 flex items-center gap-3 text-xs uppercase tracking-[0.16em] text-slate-400"><span class="h-px flex-1 bg-slate-200"></span>OIDC<span class="h-px flex-1 bg-slate-200"></span></div>
        <button type="button" class="inline-flex w-full items-center justify-center gap-2 rounded-xl border border-slate-300 px-4 py-3 text-sm font-bold text-slate-700">
          <i class="fa-brands fa-openid"></i>OpenID Connect 登录
        </button>
      </section>
    </div>
  </main>
</body>
</html>
