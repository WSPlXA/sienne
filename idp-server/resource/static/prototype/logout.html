<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prototype - Logout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Manrope", "Noto Sans SC", "sans-serif"] } } } };
  </script>
</head>
<body class="min-h-screen bg-[linear-gradient(135deg,#fff7ed_0%,#fffaf5_48%,#fef2f2_100%)] font-sans text-slate-900">
  <main class="mx-auto flex min-h-screen max-w-3xl items-center justify-center px-5 py-10">
    <section class="w-full max-w-lg rounded-3xl border border-slate-200 bg-white p-8 shadow-xl">
      <div class="inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-orange-50 text-orange-700"><i class="fa-solid fa-right-from-bracket"></i></div>
      <h1 class="mt-4 text-3xl font-extrabold tracking-tight">确认登出</h1>
      <p class="mt-2 text-sm text-slate-500">将终止当前 IdP 会话并回调 post_logout_redirect_uri</p>

      <div class="mt-6 rounded-2xl border border-slate-200 bg-slate-50 p-5 text-sm">
        <p class="text-xs font-bold uppercase tracking-[0.16em] text-slate-500">client_id</p>
        <p class="mt-1 font-semibold">demo-web</p>
        <p class="mt-4 text-xs font-bold uppercase tracking-[0.16em] text-slate-500">post_logout_redirect_uri</p>
        <p class="mt-1 break-all font-semibold">https://demo.example.com/logout/callback</p>
      </div>

      <button class="mt-6 inline-flex w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-orange-600 to-red-600 px-4 py-3 text-sm font-bold text-white"><i class="fa-solid fa-power-off"></i>执行登出</button>
    </section>
  </main>
</body>
</html>
