<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prototype - TOTP Bind</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Manrope", "Noto Sans SC", "sans-serif"] } } } };
  </script>
</head>
<body class="min-h-screen bg-[linear-gradient(135deg,#e0f2fe_0%,#f8fafc_50%,#ecfeff_100%)] font-sans text-slate-900">
  <main class="mx-auto flex min-h-screen max-w-5xl items-center px-5 py-10">
    <section class="w-full rounded-3xl border border-slate-200 bg-white p-6 shadow-xl sm:p-8">
      <div class="grid gap-6 lg:grid-cols-[1fr_340px]">
        <div>
          <h1 class="text-3xl font-extrabold tracking-tight">绑定 MFA（TOTP）</h1>
          <p class="mt-2 text-sm text-slate-500">扫码后输入 6 位码完成绑定</p>
          <div class="mt-6 grid gap-4 rounded-2xl border border-slate-200 bg-slate-50 p-4 sm:grid-cols-[220px_1fr]">
            <div class="rounded-xl border border-slate-200 bg-white p-3"><img class="mx-auto w-full max-w-[180px]" src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=otpauth://totp/Sienne:alice@example.com?secret=JBSWY3DPEHPK3PXP&issuer=Sienne"></div>
            <div class="space-y-3">
              <div>
                <p class="text-xs font-bold uppercase tracking-[0.16em] text-slate-500">Secret</p>
                <p class="mt-1 rounded-lg border border-slate-200 bg-white px-3 py-2 font-mono text-sm">JBSWY3DPEHPK3PXP</p>
              </div>
              <div>
                <p class="text-xs font-bold uppercase tracking-[0.16em] text-slate-500">URI</p>
                <p class="mt-1 break-all rounded-lg border border-dashed border-cyan-300 bg-cyan-50 px-3 py-2 text-xs">otpauth://totp/Sienne:alice@example.com?secret=JBSWY3DPEHPK3PXP&issuer=Sienne</p>
              </div>
            </div>
          </div>

          <form class="mt-5 space-y-4">
            <label class="block">
              <span class="mb-2 block text-xs font-bold uppercase tracking-[0.16em] text-slate-500">验证码</span>
              <input value="153028" class="w-full rounded-xl border border-slate-300 px-4 py-3 text-center text-2xl font-extrabold tracking-[0.35em] outline-none focus:border-cyan-500 focus:ring-4 focus:ring-cyan-100">
            </label>
            <button type="button" class="inline-flex items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-cyan-600 to-teal-700 px-5 py-3 text-sm font-bold text-white">
              <i class="fa-solid fa-shield"></i>完成绑定
            </button>
          </form>
        </div>

        <aside class="rounded-2xl border border-slate-200 bg-slate-50 p-5">
          <p class="text-xs font-bold uppercase tracking-[0.16em] text-slate-500">绑定结果</p>
          <div class="mt-3 rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700"><i class="fa-solid fa-circle-check mr-2"></i>示例：绑定成功，将跳回授权页面。</div>
          <ul class="mt-4 space-y-2 text-sm text-slate-700">
            <li class="flex gap-2"><i class="fa-solid fa-check mt-1 text-emerald-600"></i>enable_2fa 防重放</li>
            <li class="flex gap-2"><i class="fa-solid fa-check mt-1 text-emerald-600"></i>CSRF 校验</li>
            <li class="flex gap-2"><i class="fa-solid fa-check mt-1 text-emerald-600"></i>回调 return_to</li>
          </ul>
        </aside>
      </div>
    </section>
  </main>
</body>
</html>
