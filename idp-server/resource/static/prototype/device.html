<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prototype - Device</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Manrope", "Noto Sans SC", "sans-serif"] } } } };
  </script>
</head>
<body class="min-h-screen bg-[linear-gradient(135deg,#fffbeb_0%,#f8fafc_48%,#eef2ff_100%)] font-sans text-slate-900">
  <main class="mx-auto flex min-h-screen max-w-4xl items-center justify-center px-5 py-10">
    <section class="w-full max-w-xl rounded-3xl border border-slate-200 bg-white p-8 shadow-xl">
      <h1 class="text-3xl font-extrabold tracking-tight">设备码认证</h1>
      <p class="mt-2 text-sm text-slate-500">输入电视/终端上显示的 User Code</p>

      <div class="mt-6 space-y-4">
        <label class="block">
          <span class="mb-2 block text-xs font-bold uppercase tracking-[0.16em] text-slate-500">User Code</span>
          <input value="ABCD-EFGH" class="w-full rounded-xl border border-slate-300 px-4 py-3 text-lg font-bold tracking-[0.2em] outline-none focus:border-amber-500 focus:ring-4 focus:ring-amber-100">
        </label>
      </div>

      <div class="mt-6 rounded-2xl border border-slate-200 bg-slate-50 p-5 text-sm">
        <p class="text-xs font-bold uppercase tracking-[0.16em] text-slate-500">Client</p>
        <p class="mt-1 text-base font-bold">Living Room TV App</p>
        <div class="mt-3 flex flex-wrap gap-2">
          <span class="rounded-full border border-amber-200 bg-amber-50 px-3 py-1 text-xs font-semibold text-amber-700">openid</span>
          <span class="rounded-full border border-amber-200 bg-amber-50 px-3 py-1 text-xs font-semibold text-amber-700">profile</span>
        </div>
      </div>

      <div class="mt-6 flex flex-col gap-3 sm:flex-row">
        <button class="inline-flex flex-1 items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-emerald-600 to-teal-700 px-4 py-3 text-sm font-bold text-white"><i class="fa-solid fa-check"></i>批准</button>
        <button class="inline-flex flex-1 items-center justify-center gap-2 rounded-xl border border-slate-300 px-4 py-3 text-sm font-bold text-slate-700"><i class="fa-solid fa-xmark"></i>拒绝</button>
      </div>
    </section>
  </main>
</body>
</html>
