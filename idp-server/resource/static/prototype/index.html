<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IDP 高保真原型总览</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Manrope", "Noto Sans SC", "sans-serif"]
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_10%_8%,#bfdbfe_0%,transparent_28%),radial-gradient(circle_at_88%_12%,#bbf7d0_0%,transparent_24%),linear-gradient(135deg,#eff6ff_0%,#f8fafc_45%,#ecfdf5_100%)] text-slate-900">
  <div class="mx-auto max-w-[1400px] px-4 py-8 sm:px-6 lg:px-8">
    <header class="mb-8 rounded-3xl border border-slate-200 bg-white/85 p-6 shadow-[0_20px_80px_rgba(15,23,42,0.1)] backdrop-blur sm:p-8">
      <div class="flex flex-wrap items-start justify-between gap-4">
        <div>
          <p class="text-xs font-bold uppercase tracking-[0.22em] text-slate-500">Sienne IDP Prototype</p>
          <h1 class="mt-2 text-3xl font-extrabold tracking-tight sm:text-4xl">身份认证系统高保真界面</h1>
          <p class="mt-2 text-sm text-slate-600">每个界面是独立 HTML 文件，下方通过 iframe 嵌入预览，可直接交给前后端联调开发。</p>
        </div>
        <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-xs text-slate-600">
          <div class="font-semibold text-slate-800">核心流程</div>
          <div class="mt-1">login → (mfa bind / totp verify) → consent → token</div>
        </div>
      </div>
    </header>

    <main class="grid gap-6 lg:grid-cols-2">
      <section class="rounded-3xl border border-slate-200 bg-white/90 p-4 shadow-[0_18px_70px_rgba(15,23,42,0.08)] sm:p-5">
        <div class="mb-3 flex items-center justify-between">
          <h2 class="text-lg font-extrabold"><i class="fa-solid fa-right-to-bracket mr-2 text-emerald-600"></i>登录</h2>
          <a class="text-xs font-semibold text-emerald-700 hover:underline" href="./login.html" target="_blank" rel="noreferrer">打开</a>
        </div>
        <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white">
          <iframe title="login" src="./login.html" class="h-[620px] w-full"></iframe>
        </div>
      </section>

      <section class="rounded-3xl border border-slate-200 bg-white/90 p-4 shadow-[0_18px_70px_rgba(15,23,42,0.08)] sm:p-5">
        <div class="mb-3 flex items-center justify-between">
          <h2 class="text-lg font-extrabold"><i class="fa-solid fa-mobile-screen mr-2 text-teal-600"></i>TOTP 登录验证</h2>
          <a class="text-xs font-semibold text-teal-700 hover:underline" href="./login_totp.html" target="_blank" rel="noreferrer">打开</a>
        </div>
        <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white">
          <iframe title="login totp" src="./login_totp.html" class="h-[620px] w-full"></iframe>
        </div>
      </section>

      <section class="rounded-3xl border border-slate-200 bg-white/90 p-4 shadow-[0_18px_70px_rgba(15,23,42,0.08)] sm:p-5">
        <div class="mb-3 flex items-center justify-between">
          <h2 class="text-lg font-extrabold"><i class="fa-solid fa-qrcode mr-2 text-cyan-600"></i>MFA 绑定</h2>
          <a class="text-xs font-semibold text-cyan-700 hover:underline" href="./totp_bind.html" target="_blank" rel="noreferrer">打开</a>
        </div>
        <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white">
          <iframe title="totp bind" src="./totp_bind.html" class="h-[620px] w-full"></iframe>
        </div>
      </section>

      <section class="rounded-3xl border border-slate-200 bg-white/90 p-4 shadow-[0_18px_70px_rgba(15,23,42,0.08)] sm:p-5">
        <div class="mb-3 flex items-center justify-between">
          <h2 class="text-lg font-extrabold"><i class="fa-solid fa-user-check mr-2 text-indigo-600"></i>授权同意</h2>
          <a class="text-xs font-semibold text-indigo-700 hover:underline" href="./consent.html" target="_blank" rel="noreferrer">打开</a>
        </div>
        <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white">
          <iframe title="consent" src="./consent.html" class="h-[620px] w-full"></iframe>
        </div>
      </section>

      <section class="rounded-3xl border border-slate-200 bg-white/90 p-4 shadow-[0_18px_70px_rgba(15,23,42,0.08)] sm:p-5">
        <div class="mb-3 flex items-center justify-between">
          <h2 class="text-lg font-extrabold"><i class="fa-solid fa-tv mr-2 text-amber-600"></i>设备码验证</h2>
          <a class="text-xs font-semibold text-amber-700 hover:underline" href="./device.html" target="_blank" rel="noreferrer">打开</a>
        </div>
        <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white">
          <iframe title="device" src="./device.html" class="h-[620px] w-full"></iframe>
        </div>
      </section>

      <section class="rounded-3xl border border-slate-200 bg-white/90 p-4 shadow-[0_18px_70px_rgba(15,23,42,0.08)] sm:p-5">
        <div class="mb-3 flex items-center justify-between">
          <h2 class="text-lg font-extrabold"><i class="fa-solid fa-right-from-bracket mr-2 text-orange-600"></i>登出确认</h2>
          <a class="text-xs font-semibold text-orange-700 hover:underline" href="./logout.html" target="_blank" rel="noreferrer">打开</a>
        </div>
        <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white">
          <iframe title="logout" src="./logout.html" class="h-[620px] w-full"></iframe>
        </div>
      </section>

      <section class="rounded-3xl border border-slate-200 bg-white/90 p-4 shadow-[0_18px_70px_rgba(15,23,42,0.08)] sm:p-5 lg:col-span-2">
        <div class="mb-3 flex items-center justify-between">
          <h2 class="text-lg font-extrabold"><i class="fa-solid fa-user-plus mr-2 text-sky-600"></i>注册界面（扩展）</h2>
          <a class="text-xs font-semibold text-sky-700 hover:underline" href="./register.html" target="_blank" rel="noreferrer">打开</a>
        </div>
        <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white">
          <iframe title="register" src="./register.html" class="h-[700px] w-full"></iframe>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
