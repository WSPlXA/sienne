<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prototype - Consent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ["Manrope", "Noto Sans SC", "sans-serif"] } } } };
  </script>
</head>
<body class="min-h-screen bg-[linear-gradient(135deg,#eef2ff_0%,#f8fafc_55%,#f0fdf4_100%)] font-sans text-slate-900">
  <main class="mx-auto flex min-h-screen max-w-5xl items-center px-5 py-10">
    <section class="grid w-full overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-xl md:grid-cols-[1fr_340px]">
      <div class="p-7 sm:p-9">
        <h1 class="text-3xl font-extrabold tracking-tight">应用授权</h1>
        <p class="mt-2 text-sm text-slate-500">Demo Client 请求访问以下范围</p>

        <div class="mt-6 rounded-2xl border border-slate-200 bg-slate-50 p-5">
          <p class="text-xs font-bold uppercase tracking-[0.16em] text-slate-500">Client</p>
          <p class="mt-1 text-2xl font-extrabold">Demo Web App</p>
          <div class="mt-4 flex flex-wrap gap-2">
            <span class="rounded-full border border-indigo-200 bg-indigo-50 px-3 py-1 text-xs font-semibold text-indigo-700">openid</span>
            <span class="rounded-full border border-indigo-200 bg-indigo-50 px-3 py-1 text-xs font-semibold text-indigo-700">profile</span>
            <span class="rounded-full border border-indigo-200 bg-indigo-50 px-3 py-1 text-xs font-semibold text-indigo-700">email</span>
          </div>
        </div>

        <div class="mt-6 flex flex-col gap-3 sm:flex-row">
          <button class="inline-flex flex-1 items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-emerald-600 to-teal-700 px-4 py-3 text-sm font-bold text-white"><i class="fa-solid fa-check"></i>允许</button>
          <button class="inline-flex flex-1 items-center justify-center gap-2 rounded-xl border border-slate-300 px-4 py-3 text-sm font-bold text-slate-700"><i class="fa-solid fa-xmark"></i>拒绝</button>
        </div>
      </div>
      <aside class="border-t border-slate-200 bg-slate-50 p-6 md:border-l md:border-t-0">
        <p class="text-xs font-bold uppercase tracking-[0.16em] text-slate-500">OAuth Context</p>
        <div class="mt-3 rounded-xl border border-slate-200 bg-white p-3 text-xs text-slate-600">return_to: /oauth2/authorize?client_id=demo-web</div>
        <ul class="mt-4 space-y-2 text-sm text-slate-700">
          <li class="flex gap-2"><i class="fa-solid fa-lock mt-1 text-indigo-600"></i>同意结果写入授权码</li>
          <li class="flex gap-2"><i class="fa-solid fa-arrow-right mt-1 text-indigo-600"></i>随后跳回客户端 redirect_uri</li>
        </ul>
      </aside>
    </section>
  </main>
</body>
</html>
