<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Consent | Sienne IDP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ["'Playfair Display'", "serif"],
            sans: ["'Inter'", "sans-serif"],
            mono: ["'JetBrains Mono'", "monospace"],
          },
          colors: {
            brand: {
              black: "#0F0F11",
              white: "#FFFFFF",
              accent: "#2563EB",
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,600;0,800;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="min-h-screen bg-gray-50 text-brand-black font-sans selection:bg-brand-accent selection:text-white flex flex-col antialiased">
  <div class="absolute inset-0 bg-[linear-gradient(to_right,#e5e7eb_1px,transparent_1px),linear-gradient(to_bottom,#e5e7eb_1px,transparent_1px)] bg-[size:4rem_4rem] opacity-30 pointer-events-none fixed"></div>

  <header class="w-full border-b-2 border-brand-black px-6 py-4 flex justify-between items-center bg-white relative z-20">
    <div class="flex items-center gap-3">
      <div class="h-6 w-6 bg-brand-black text-white flex items-center justify-center text-xs">
        <i class="fa-solid fa-handshake"></i>
      </div>
      <span class="font-mono text-xs font-bold uppercase tracking-widest">Sienne IDP</span>
    </div>
    <div class="font-mono text-xs text-gray-500 uppercase tracking-widest hidden sm:block">SYS.CONSENT.01</div>
  </header>

  <main class="flex-1 flex items-center justify-center p-6 relative z-10">
    <div class="w-full max-w-2xl bg-white border-2 border-brand-black shadow-[8px_8px_0_0_#0F0F11]">
      <div class="p-8 md:p-12 border-b-2 border-brand-black bg-brand-black text-white relative overflow-hidden">
        <div class="absolute right-0 top-0 opacity-10 text-[8rem] font-serif font-black leading-none pointer-events-none">AUTH</div>
        <p class="font-mono text-xs font-bold uppercase tracking-widest text-brand-accent mb-4">Consent Request</p>
        <h1 class="font-serif text-4xl md:text-5xl font-extrabold tracking-tight">Authorize Access</h1>
      </div>

      <div class="p-8 md:p-12">
        {{if .Error}}
        <div class="mb-8 border-2 border-brand-black bg-red-100 p-4 font-mono text-sm text-brand-black font-bold shadow-[4px_4px_0_0_#0F0F11]">
          <i class="fa-solid fa-triangle-exclamation mr-2 text-red-600"></i>[ERR] {{.Error}}
        </div>
        {{end}}

        <div class="border-2 border-brand-black bg-gray-50 mb-8 p-6">
          <div class="flex items-center justify-between border-b-2 border-gray-200 pb-6 mb-6">
            <div>
              <p class="font-mono text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Requesting Client</p>
              <p class="font-serif text-2xl font-extrabold text-brand-black">{{if .ClientName}}{{.ClientName}}{{else}}{{.ClientID}}{{end}}</p>
            </div>
            <div class="h-12 w-12 border-2 border-brand-black bg-white flex items-center justify-center text-xl text-brand-black">
              <i class="fa-solid fa-building-shield"></i>
            </div>
          </div>

          <div>
            <p class="font-mono text-xs font-bold uppercase tracking-widest text-gray-500 mb-4">Requested Scopes</p>
            <div class="flex flex-wrap gap-2">
              {{range .Scopes}}
              <span class="inline-block border-2 border-brand-black bg-brand-black px-3 py-1 font-mono text-xs font-bold text-white">{{.}}</span>
              {{else}}
              <span class="inline-block border-2 border-gray-300 bg-white px-3 py-1 font-mono text-xs font-bold text-gray-500">No scopes requested</span>
              {{end}}
            </div>
          </div>
        </div>

        <form method="post">
          <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
          <input type="hidden" name="return_to" value="{{.ReturnTo}}">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <button type="submit" name="action" value="accept" class="w-full border-2 border-brand-black bg-brand-black px-4 py-4 font-mono text-sm font-bold text-white transition-all hover:bg-white hover:text-brand-black hover:shadow-[4px_4px_0_0_#0F0F11]">
              <span class="flex items-center justify-center gap-2">
                <i class="fa-solid fa-check"></i> ALLOW ACCESS
              </span>
            </button>
            <button type="submit" name="action" value="deny" class="w-full border-2 border-brand-black bg-white px-4 py-4 font-mono text-sm font-bold text-brand-black transition-all hover:bg-red-600 hover:text-white hover:border-red-600 hover:shadow-[4px_4px_0_0_#DC2626]">
              <span class="flex items-center justify-center gap-2">
                <i class="fa-solid fa-xmark"></i> DENY
              </span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
