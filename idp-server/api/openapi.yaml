openapi: 3.0.3
info:
  title: IDP Server API
  version: 0.2.0
  description: |
    OpenAPI contract for the current Go IdP / OAuth2 / OIDC server.
    This document is aligned with the implemented routes and handlers under
    `internal/interfaces/http`.

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: system
  - name: authn
  - name: authz
  - name: oidc

paths:
  /healthz:
    get:
      tags: [system]
      summary: Health check
      operationId: healthz
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /.well-known/openid-configuration:
    get:
      tags: [oidc]
      summary: OIDC discovery document
      operationId: openidConfiguration
      responses:
        '200':
          description: OIDC discovery metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryDocument'
        '500':
          description: Discovery generation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /register:
    get:
      tags: [authn]
      summary: Registration endpoint description
      operationId: getRegisterInfo
      responses:
        '200':
          description: Registration usage hint and CSRF token
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Sets the `idp_csrf_token` cookie when needed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterInfoResponse'
        '500':
          description: Failed to generate CSRF token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [authn]
      summary: Register a new user
      description: |
        Submit registration data with a CSRF token. The CSRF token may be
        provided in the body as `csrf_token` or in the `X-CSRF-Token` header,
        and must match the `idp_csrf_token` cookie set by `GET /register`.
      operationId: registerUser
      parameters:
        - $ref: '#/components/parameters/XCSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Invalid registration request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid CSRF token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Registration failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /login:
    get:
      tags: [authn]
      summary: Login page, login metadata, or federated OIDC callback
      description: |
        When called without `code`/`state`, this endpoint returns either HTML
        or JSON login metadata depending on the `Accept` header. When called
        with federated OIDC callback parameters, it may authenticate the user
        and redirect to the original `return_to` path.
      operationId: getLogin
      parameters:
        - name: method
          in: query
          required: false
          schema:
            type: string
            enum: [password, federated_oidc]
        - name: return_to
          in: query
          required: false
          schema:
            type: string
        - name: redirect_uri
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: nonce
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Login page or JSON login metadata
          headers:
            Set-Cookie:
              schema:
                type: string
              description: May set `idp_csrf_token` and, after successful authentication, `idp_session`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginInfoResponse'
            text/html:
              schema:
                type: string
        '302':
          description: Redirect after successful login or federated OIDC flow
          headers:
            Location:
              schema:
                type: string
            Set-Cookie:
              schema:
                type: string
        '400':
          description: Invalid request or invalid `return_to`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: User disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '423':
          description: User locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Login failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [authn]
      summary: Login with password or start federated OIDC
      description: |
        Submit username/password for local login, or set `method=federated_oidc`
        to start external OIDC login. The CSRF token may be provided in the
        body as `csrf_token` or in the `X-CSRF-Token` header, and must match
        the `idp_csrf_token` cookie set by `GET /login`.
      operationId: login
      parameters:
        - $ref: '#/components/parameters/XCSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful and returns session information
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Sets the `idp_session` cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
            text/html:
              schema:
                type: string
        '302':
          description: Redirect to `return_to`, `/login`, or upstream OIDC provider
          headers:
            Location:
              schema:
                type: string
            Set-Cookie:
              schema:
                type: string
        '400':
          description: Invalid login request or unsupported authentication method
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: User disabled or invalid CSRF token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '423':
          description: User locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Login rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Login failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /logout:
    post:
      tags: [authn]
      summary: Logout current browser session
      description: |
        Clears the current `idp_session` cookie and marks the session as logged
        out. The CSRF token may be provided in the body as `csrf_token` or in
        the `X-CSRF-Token` header, and must match the `idp_csrf_token` cookie.
      operationId: logout
      parameters:
        - $ref: '#/components/parameters/XCSRFToken'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logout successful
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Clears the `idp_session` cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '302':
          description: Logout successful and redirected to `return_to` or `/login`
          headers:
            Location:
              schema:
                type: string
            Set-Cookie:
              schema:
                type: string
        '400':
          description: Invalid logout request or invalid `return_to`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid CSRF token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Logout failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /consent:
    get:
      tags: [authz]
      summary: Render or inspect consent request
      operationId: getConsent
      parameters:
        - name: return_to
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Consent page or JSON consent summary
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Sets the `idp_csrf_token` cookie when needed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentInfoResponse'
            text/html:
              schema:
                type: string
        '302':
          description: Redirect to login if user session is missing
          headers:
            Location:
              schema:
                type: string
        '400':
          description: Invalid consent request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentErrorResponse'
        '500':
          description: Consent preparation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [authz]
      summary: Accept or deny consent
      description: |
        Submit `action=accept` or `action=deny`. The CSRF token may be provided
        in the body as `csrf_token` or in the `X-CSRF-Token` header, and must
        match the `idp_csrf_token` cookie set by `GET /consent`.
      operationId: submitConsent
      parameters:
        - $ref: '#/components/parameters/XCSRFToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsentDecisionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ConsentDecisionRequest'
      responses:
        '302':
          description: Redirect back into authorize flow or client callback
          headers:
            Location:
              schema:
                type: string
        '400':
          description: Invalid consent action or request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentErrorResponse'
        '403':
          description: Invalid CSRF token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Consent processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /oauth2/authorize:
    get:
      tags: [authz]
      summary: OAuth2 authorization endpoint
      description: |
        Starts the authorization code flow. On success it redirects to the
        client redirect URI with `code` and optional `state`. If login or
        consent is required, it redirects to `/login` or `/consent`. When the
        request is invalid and a redirect URI is available, the server redirects
        back to the client with OAuth error parameters.
      operationId: authorize
      parameters:
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            example: code
        - name: client_id
          in: query
          required: true
          schema:
            type: string
            example: web-client
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
            format: uri
        - name: scope
          in: query
          required: false
          schema:
            type: string
            example: openid profile email
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: nonce
          in: query
          required: false
          schema:
            type: string
        - name: code_challenge
          in: query
          required: false
          schema:
            type: string
        - name: code_challenge_method
          in: query
          required: false
          schema:
            type: string
            enum: [plain, S256]
      responses:
        '302':
          description: Redirect to client callback, login page, or consent page
          headers:
            Location:
              schema:
                type: string
        '400':
          description: Invalid authorization request when redirect cannot be built
          content:
            text/plain:
              schema:
                type: string

  /oauth2/clients:
    post:
      tags: [authz]
      summary: Create an OAuth client
      description: |
        Creates a new OAuth client and writes its core configuration, grant
        types, auth methods, scopes, and optional redirect URIs in one step.
      operationId: createClient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateClientRequest'
      responses:
        '201':
          description: Client created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateClientResponse'
        '400':
          description: Invalid client payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Client ID already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Client creation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /oauth2/clients/{client_id}/redirect-uris:
    post:
      tags: [authz]
      summary: Register redirect URIs for an OAuth client
      description: |
        Adds one or more redirect URIs into `oauth_client_redirect_uris` for
        an existing OAuth client. Re-registering the same URI is idempotent.
      operationId: registerClientRedirectUris
      parameters:
        - name: client_id
          in: path
          required: true
          schema:
            type: string
            example: web-client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterClientRedirectURIRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterClientRedirectURIRequest'
      responses:
        '201':
          description: Redirect URIs registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterClientRedirectURIResponse'
        '400':
          description: Invalid client id or redirect URI payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Client not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Registration failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /oauth2/token:
    post:
      tags: [authz]
      summary: Exchange authorization code, refresh token, or client credentials
      description: |
        Supports `authorization_code`, `refresh_token`, and `client_credentials`.
        Client authentication can be supplied via HTTP Basic auth or through
        `client_id` and `client_secret` form fields when the client uses
        `client_secret_post`. Public clients may use `none`.
      operationId: token
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: Token response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Invalid token request or invalid grant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
        '401':
          description: Invalid client authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
        '500':
          description: Token issuance failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'

  /oauth2/introspect:
    post:
      tags: [oidc]
      summary: OAuth2 token introspection
      description: |
        Introspects an access token issued by this server. Client authentication
        is required and may be supplied via HTTP Basic auth or through
        `client_id` and `client_secret` request fields.
      operationId: introspect
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/IntrospectRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/IntrospectRequest'
      responses:
        '200':
          description: Token introspection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntrospectionResponse'
        '400':
          description: Invalid introspection request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
        '401':
          description: Client authentication is required or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
        '500':
          description: Introspection failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'

  /oauth2/userinfo:
    get:
      tags: [oidc]
      summary: OIDC userinfo endpoint
      operationId: userInfo
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
        '401':
          description: Missing, revoked, or invalid access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Subject not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Userinfo lookup failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /oauth2/jwks:
    get:
      tags: [oidc]
      summary: JSON Web Key Set
      operationId: jwks
      responses:
        '200':
          description: Public signing keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWKS'
        '500':
          description: JWKS generation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    XCSRFToken:
      name: X-CSRF-Token
      in: header
      required: false
      description: |
        Optional CSRF token header. If omitted, the same token may be supplied
        in the request body as `csrf_token`. In both cases it must match the
        `idp_csrf_token` cookie.
      schema:
        type: string

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: invalid request

    ConsentErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        return_to:
          type: string

    OAuthError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: invalid_grant
        error_description:
          type: string

    RegisterInfoResponse:
      type: object
      required: [endpoint, message, csrf_token]
      properties:
        endpoint:
          type: string
          example: register
        message:
          type: string
          example: submit username, email, display_name and password to register
        csrf_token:
          type: string

    RegisterRequest:
      type: object
      required: [username, email, display_name, password]
      properties:
        username:
          type: string
          example: alice
        email:
          type: string
          format: email
          example: alice@example.com
        display_name:
          type: string
          example: Alice
        password:
          type: string
          format: password
          example: alice123
        csrf_token:
          type: string
        email_verified:
          type: boolean
          default: false

    RegisterResponse:
      type: object
      required:
        - user_id
        - user_uuid
        - username
        - email
        - email_verified
        - display_name
        - status
        - created_at
      properties:
        user_id:
          type: integer
          format: int64
        user_uuid:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        email_verified:
          type: boolean
        display_name:
          type: string
        status:
          type: string
          example: active
        created_at:
          type: string
          format: date-time

    LoginInfoResponse:
      type: object
      required:
        - endpoint
        - message
        - csrf_token
        - federated_oidc_enabled
        - federated_oidc_endpoint
        - federated_oidc_method
      properties:
        endpoint:
          type: string
          example: login
        message:
          type: string
          example: submit username and password to login
        csrf_token:
          type: string
        return_to:
          type: string
          nullable: true
        federated_oidc_enabled:
          type: boolean
        federated_oidc_endpoint:
          type: string
          example: /login
        federated_oidc_method:
          type: string
          example: POST

    LoginRequest:
      type: object
      properties:
        method:
          type: string
          enum: [password, federated_oidc]
        username:
          type: string
        password:
          type: string
          format: password
        csrf_token:
          type: string
        return_to:
          type: string
        redirect_uri:
          type: string
        state:
          type: string
        code:
          type: string
        nonce:
          type: string

    LoginResponse:
      type: object
      required: [session_id, user_id, subject, expires_at]
      properties:
        session_id:
          type: string
          format: uuid
        user_id:
          type: integer
          format: int64
        subject:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time

    LogoutRequest:
      type: object
      properties:
        return_to:
          type: string
        csrf_token:
          type: string

    LogoutResponse:
      type: object
      required: [logged_out]
      properties:
        logged_out:
          type: boolean
          example: true

    ConsentInfoResponse:
      type: object
      required: [endpoint, client_id, client_name, scopes, return_to, message, csrf_token]
      properties:
        endpoint:
          type: string
          example: consent
        client_id:
          type: string
        client_name:
          type: string
        scopes:
          type: array
          items:
            type: string
        csrf_token:
          type: string
        return_to:
          type: string
        message:
          type: string
          example: submit action=accept or action=deny

    ConsentDecisionRequest:
      type: object
      required: [action, return_to]
      properties:
        action:
          type: string
          enum: [accept, deny]
        return_to:
          type: string
        csrf_token:
          type: string

    CreateClientRequest:
      type: object
      required:
        - client_id
        - client_name
        - grant_types
        - scopes
      properties:
        client_id:
          type: string
          example: demo-web-client
        client_name:
          type: string
          example: Demo Web Client
        client_secret:
          type: string
          format: password
          example: super-secret-1
        client_type:
          type: string
          enum: [confidential, public]
          default: confidential
        token_endpoint_auth_method:
          type: string
          enum: [client_secret_basic, client_secret_post, none]
        require_pkce:
          type: boolean
          default: true
        require_consent:
          type: boolean
          default: true
        access_token_ttl_seconds:
          type: integer
          format: int32
          default: 3600
        refresh_token_ttl_seconds:
          type: integer
          format: int32
