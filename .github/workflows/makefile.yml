name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths:
      - ".github/workflows/makefile.yml"
      - "idp-server/**"
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/makefile.yml"
      - "idp-server/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  GO_VERSION_FILE: idp-server/go.mod
  GO_CACHE_PATH: idp-server/go.sum
  WORKING_DIR: idp-server

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_CACHE_PATH }}

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m ./...
        working-directory: ${{ env.WORKING_DIR }}

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_CACHE_PATH }}

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        working-directory: ${{ env.WORKING_DIR }}

  wire-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_CACHE_PATH }}

      - name: Check wire generation
        run: |
          go install github.com/google/wire/cmd/wire@latest
          wire gen ./internal/bootstrap
          if [ -n "$(git status --porcelain)" ]; then
            echo "Wire generated code is out of date. Please run 'wire gen ./internal/bootstrap' and commit the changes."
            git status --porcelain
            exit 1
          fi
        working-directory: ${{ env.WORKING_DIR }}

  test:
    needs: [lint, vulncheck, wire-check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_CACHE_PATH }}
          
      - name: Install dependencies
        run: go mod download
        working-directory: ${{ env.WORKING_DIR }}

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
        working-directory: ${{ env.WORKING_DIR }}

  build-binaries:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: bin/idp-server
            artifact_name: idp-server-linux-amd64
          - goos: windows
            goarch: amd64
            output: bin/idp-server.exe
            artifact_name: idp-server-windows-amd64

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: ${{ env.GO_CACHE_PATH }}

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bin
          go build -trimpath -ldflags="-s -w" -o ${{ matrix.output }} ./cmd/idp
        working-directory: ${{ env.WORKING_DIR }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.WORKING_DIR }}/${{ matrix.output }}
          if-no-files-found: error
          retention-days: 7

  docker:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ${{ github.repository }}-idp-server

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image name
        id: image
        run: |
          echo "name=${{ env.REGISTRY }}/${GITHUB_REPOSITORY_OWNER,,}/${GITHUB_REPOSITORY#*/}-idp-server" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ env.WORKING_DIR }}
          file: ./${{ env.WORKING_DIR }}/dockerfile.server
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
